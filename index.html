<script>
(function(){
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
  function show(html){
    var r=document.getElementById("root");
    if(r){ r.innerHTML='<div style="font-family:-apple-system,system-ui,sans-serif;padding:26px;color:#1B231D;font-size:15px;line-height:1.55;max-width:560px;margin:0 auto">'+html+'</div>'; }
  }
  window.__mounted=false; window.__err=false;
  window.addEventListener("error", function(e){
    if(e && e.target && (e.target.tagName==="SCRIPT"||e.target.tagName==="LINK")){
      window.__err=true;
      show("<b>Could not load a required file:</b><br><span style=\"word-break:break-all;color:#6B756C\">"+esc(e.target.src||e.target.href)+"</span><br><br>Usually a connection problem or a content/ad blocker. Reconnect (or allow this site) and reopen.");
      return;
    }
    window.__err=true;
    show("<b>Error:</b> "+esc(e&&e.message?e.message:"script error")+"<br><br>Copy this line and tell Claude.");
  }, true);
  window.addEventListener("unhandledrejection", function(e){
    window.__err=true;
    show("<b>Error:</b> "+esc(e&&e.reason?(e.reason.message||e.reason):"promise rejection")+"<br><br>Copy this line and tell Claude.");
  });
  try{ if("serviceWorker" in navigator){ navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }); } }catch(_){}
  try{ if(window.caches){ caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }); } }catch(_){}
  window.addEventListener("load", function(){
    setTimeout(function(){
      if(!window.__mounted && !window.__err){
        show("Still loading after several seconds. React most likely could not download. Check your internet or any content blocker, then reopen.");
      }
    }, 8000);
  });
})();
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body>
<div id="root"><div style="font-family:-apple-system,system-ui,sans-serif;padding:26px;color:#6B756C;font-size:15px">Loading Plate…</div></div>
<script id="appsrc" type="text/plain">
const { useState, useEffect } = React;
window.storage = {
  async get(key){ try { const v = localStorage.getItem('plate::'+key); return v===null?null:{key,value:v,shared:false}; } catch(e){ return null; } },
  async set(key,value){ localStorage.setItem('plate::'+key, String(value)); return {key,value,shared:false}; },
  async delete(key){ localStorage.removeItem('plate::'+key); return {key,deleted:true}; },
  async list(prefix){ const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.indexOf('plate::')===0){ const bare=k.slice(7); if(!prefix || bare.indexOf(prefix)===0) keys.push(bare);} } return {keys}; }
};

const APP_VERSION = "1.1"; // PLATEV=1.1

// ---- helpers ------------------------------------------------------
function localDateKey(d = new Date()) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function prettyDate(key) {
  const [y, m, d] = key.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
}
function shortDate(key) {
  const [y, m, d] = key.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function dayInitial(key) {
  const [y, m, d] = key.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: "short" }).slice(0, 1);
}
function last7Keys(todayKey) {
  const [y, m, d] = todayKey.split("-").map(Number);
  const base = new Date(y, m - 1, d);
  const arr = [];
  for (let i = 6; i >= 0; i--) {
    const dd = new Date(base);
    dd.setDate(base.getDate() - i);
    arr.push(localDateKey(dd));
  }
  return arr;
}
const STORE_KEY = "plate-data-v1";
const round = (x) => Math.max(0, Math.round(Number(x) || 0));
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
const trimNum = (x) => (Number.isInteger(x) ? String(x) : String(Math.round(x * 100) / 100));

function sumEntries(entries = []) {
  return entries.reduce(
    (a, e) => ({
      calories: a.calories + round(e.calories),
      protein: a.protein + round(e.protein),
      carbs: a.carbs + round(e.carbs),
      fat: a.fat + round(e.fat),
    }),
    { calories: 0, protein: 0, carbs: 0, fat: 0 }
  );
}

const f = (id, name, unit, cal, p, c, fat) => ({ id, name, unit, per: { calories: cal, protein: p, carbs: c, fat: fat } });

const SEED_FOODS = [
  f("gv-white-bread", "Great Value white bread", "slice", 70, 3, 13, 1),
  f("black-forest-ham", "Black Forest ham, deli", "slice", 20, 3, 1, 1),
  f("gv-pepperjack", "Great Value pepper jack", "slice", 70, 4, 0, 5),
  f("cheddar-slice", "Cheddar cheese", "slice", 110, 7, 0, 9),
  f("large-egg", "Large egg", "egg", 70, 6, 0, 5),
  f("banana", "Banana", "medium", 105, 1, 27, 0),
  f("apple", "Apple", "medium", 95, 0, 25, 0),
  f("chicken-breast", "Chicken breast, cooked", "100 g", 165, 31, 0, 4),
  f("white-rice", "White rice, cooked", "cup", 205, 4, 45, 0),
  f("whole-milk", "Whole milk", "cup", 150, 8, 12, 8),
  f("peanut-butter", "Peanut butter", "tbsp", 95, 4, 3, 8),
  f("oatmeal", "Oatmeal, cooked", "cup", 150, 5, 27, 3),
  f("greek-yogurt", "Greek yogurt, plain nonfat", "170 g cup", 100, 18, 6, 0),
  f("almonds", "Almonds", "oz", 165, 6, 6, 14),
  f("ground-beef-8020", "Ground beef, 80/20, raw", "oz", 71, 5, 0, 6),
  f("potato-raw", "Potato, raw", "oz", 22, 1, 5, 0),
];

function mealTotals(meal, foods) {
  const map = Object.fromEntries(foods.map((x) => [x.id, x]));
  return (meal.items || []).reduce(
    (a, it) => {
      const food = map[it.foodId];
      if (!food) return a;
      const q = Number(it.qty) || 0;
      return {
        calories: a.calories + food.per.calories * q,
        protein: a.protein + food.per.protein * q,
        carbs: a.carbs + food.per.carbs * q,
        fat: a.fat + food.per.fat * q,
      };
    },
    { calories: 0, protein: 0, carbs: 0, fat: 0 }
  );
}
function macroLine(m) {
  return `${round(m.calories)} cal  ·  P${round(m.protein)} C${round(m.carbs)} F${round(m.fat)}`;
}

// ---- component ----------------------------------------------------
function App() {
  const [data, setData] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [today, setToday] = useState(localDateKey());
  const [tab, setTab] = useState("log");
  const [search, setSearch] = useState("");
  const [qtys, setQtys] = useState({});
  const [openRow, setOpenRow] = useState(null);
  const [saveMsg, setSaveMsg] = useState("");
  const [updateAvailable, setUpdateAvailable] = useState(false);

  const [nf, setNf] = useState({ name: "", unit: "serving", calories: "", protein: "", carbs: "", fat: "" });

  const [mealName, setMealName] = useState("");
  const [mealServings, setMealServings] = useState(1);
  const [basket, setBasket] = useState([]);
  const [mealSearch, setMealSearch] = useState("");
  const [editingMealId, setEditingMealId] = useState(null);

  const [editFoodId, setEditFoodId] = useState(null);
  const [efDraft, setEfDraft] = useState(null);
  const [editEntryId, setEditEntryId] = useState(null);
  const [eeDraft, setEeDraft] = useState(null);

  const [targetsOpen, setTargetsOpen] = useState(false);
  const [tDraft, setTDraft] = useState({ calories: "", protein: "", carbs: "", fat: "" });
  const [historyOpen, setHistoryOpen] = useState(false);
  const [weekOpen, setWeekOpen] = useState(false);
  const [dataOpen, setDataOpen] = useState(false);

  useEffect(() => {
    (async () => {
      let next = { targets: null, days: {}, foods: SEED_FOODS, meals: [], usage: {}, theme: "auto" };
      try {
        const res = await window.storage.get(STORE_KEY, false);
        if (res && res.value) {
          const p = JSON.parse(res.value);
          next = {
            targets: p.targets ?? null,
            days: p.days ?? {},
            foods: Array.isArray(p.foods) && p.foods.length ? p.foods : SEED_FOODS,
            meals: Array.isArray(p.meals) ? p.meals : [],
            usage: p.usage && typeof p.usage === "object" ? p.usage : {},
            theme: p.theme === "light" || p.theme === "dark" ? p.theme : "auto",
          };
        }
      } catch (e) {}
      const haveIds = new Set(next.foods.map((x) => x.id));
      const missing = SEED_FOODS.filter((s) => !haveIds.has(s.id));
      if (missing.length) {
        next = { ...next, foods: [...next.foods, ...missing] };
        try { await window.storage.set(STORE_KEY, JSON.stringify(next), false); } catch (e) {}
      }
      setData(next);
      if (next.targets) setTDraft({ ...next.targets });
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    const id = setInterval(() => {
      const k = localDateKey();
      setToday((cur) => (cur === k ? cur : k));
    }, 60 * 1000);
    return () => clearInterval(id);
  }, []);

  // check whether a newer version is deployed
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(location.href.split("#")[0], { cache: "no-store" });
        const txt = await res.text();
        const m = txt.match(/PLATEV=([0-9.]+)/);
        if (!cancelled && m && m[1] && m[1] !== APP_VERSION) setUpdateAvailable(true);
      } catch (e) {}
    })();
    return () => { cancelled = true; };
  }, []);

  // auto-save on any data change
  useEffect(() => {
    if (!loaded || !data) return;
    try {
      const r = window.storage.set(STORE_KEY, JSON.stringify(data), false);
      if (r && typeof r.catch === "function") r.catch(() => flash("Couldn't save — your last change may not stick."));
    } catch (e) {}
  }, [data, loaded]);

  function update(mutator) { setData((prev) => mutator(prev)); }
  function flash(msg) { setSaveMsg(msg); setTimeout(() => setSaveMsg(""), 1800); }

  const entries = data?.days?.[today] ?? [];
  const totals = sumEntries(entries);
  const targets = data?.targets ?? null;
  const foods = data?.foods ?? [];
  const meals = data?.meals ?? [];
  const usage = data?.usage ?? {};
  const theme = data?.theme ?? "auto";

  function setTheme(t) { update((prev) => ({ ...prev, theme: t })); }

  function bumpUsage(key) {
    update((prev) => ({ ...prev, usage: { ...(prev.usage || {}), [key]: ((prev.usage || {})[key] || 0) + 1 } }));
  }

  function addEntry(name, m) {
    const entry = { id: uid(), name: String(name).slice(0, 80), calories: round(m.calories), protein: round(m.protein), carbs: round(m.carbs), fat: round(m.fat) };
    update((prev) => {
      const days = { ...(prev.days || {}) };
      days[today] = [...(days[today] || []), entry];
      return { ...prev, days };
    });
  }
  function removeEntry(id) {
    update((prev) => {
      const days = { ...(prev.days || {}) };
      days[today] = (days[today] || []).filter((e) => e.id !== id);
      if (days[today].length === 0) delete days[today];
      return { ...prev, days };
    });
  }
  function clearToday() {
    update((prev) => { const days = { ...(prev.days || {}) }; delete days[today]; return { ...prev, days }; });
  }

  const getQty = (k) => { const v = qtys[k]; return v === undefined || v === "" ? 1 : Number(v); };
  const setQty = (k, v) => setQtys((q) => ({ ...q, [k]: v }));

  function logFood(food, qty) {
    const q = Number(qty) || 1;
    const m = { calories: food.per.calories * q, protein: food.per.protein * q, carbs: food.per.carbs * q, fat: food.per.fat * q };
    addEntry(q === 1 ? food.name : `${food.name} ×${trimNum(q)}`, m);
    if (food.id) bumpUsage("food:" + food.id);
    flash(`Added ${food.name}`);
  }
  function logMeal(meal, servings) {
    const s = Number(servings) || 1;
    const base = mealTotals(meal, foods);
    const m = { calories: base.calories * s, protein: base.protein * s, carbs: base.carbs * s, fat: base.fat * s };
    addEntry(s === 1 ? meal.name : `${meal.name} ×${trimNum(s)}`, m);
    if (meal.id) bumpUsage("meal:" + meal.id);
    flash(`Added ${meal.name}`);
  }

  function saveNewFood(alsoLog) {
    if (!nf.name.trim()) return;
    const food = { id: `c-${uid()}`, name: nf.name.trim(), unit: nf.unit.trim() || "serving", per: { calories: round(nf.calories), protein: round(nf.protein), carbs: round(nf.carbs), fat: round(nf.fat) }, custom: true };
    update((prev) => ({ ...prev, foods: [food, ...(prev.foods || [])] }));
    if (alsoLog) logFood(food, 1);
    else flash(`Saved ${food.name} to your foods`);
    setNf({ name: "", unit: "serving", calories: "", protein: "", carbs: "", fat: "" });
  }
  function deleteFood(id) {
    update((prev) => ({ ...prev, foods: (prev.foods || []).filter((x) => x.id !== id) }));
    setOpenRow(null);
  }

  // ---- edit a food ----
  function startEditFood(food) {
    setEditFoodId(food.id);
    setEfDraft({ name: food.name, unit: food.unit, calories: food.per.calories, protein: food.per.protein, carbs: food.per.carbs, fat: food.per.fat });
    setOpenRow(null);
  }
  function saveEditFood() {
    if (!efDraft || !efDraft.name.trim()) return;
    update((prev) => ({
      ...prev,
      foods: (prev.foods || []).map((x) => x.id === editFoodId ? { ...x, name: efDraft.name.trim(), unit: (efDraft.unit || "serving").trim(), per: { calories: round(efDraft.calories), protein: round(efDraft.protein), carbs: round(efDraft.carbs), fat: round(efDraft.fat) } } : x),
    }));
    setEditFoodId(null); setEfDraft(null);
    flash("Food updated");
  }

  // ---- edit a logged entry ----
  function startEditEntry(entry) {
    setEditEntryId(entry.id);
    setEeDraft({ name: entry.name, calories: entry.calories, protein: entry.protein, carbs: entry.carbs, fat: entry.fat });
  }
  function saveEditEntry() {
    if (!eeDraft) return;
    update((prev) => {
      const days = { ...(prev.days || {}) };
      days[today] = (days[today] || []).map((e) => e.id === editEntryId ? { ...e, name: eeDraft.name.trim() || e.name, calories: round(eeDraft.calories), protein: round(eeDraft.protein), carbs: round(eeDraft.carbs), fat: round(eeDraft.fat) } : e);
      return { ...prev, days };
    });
    setEditEntryId(null); setEeDraft(null);
  }

  // ---- meal builder ----
  function addToBasket(food) {
    setBasket((b) => {
      const i = b.findIndex((x) => x.foodId === food.id);
      if (i >= 0) { const c = [...b]; c[i] = { ...c[i], qty: Number(c[i].qty) + 1 }; return c; }
      return [...b, { foodId: food.id, qty: 1 }];
    });
    setMealSearch("");
  }
  function setBasketQty(foodId, qty) { setBasket((b) => b.map((x) => (x.foodId === foodId ? { ...x, qty } : x))); }
  function removeFromBasket(foodId) { setBasket((b) => b.filter((x) => x.foodId !== foodId)); }
  const draftMeal = { name: mealName || "Meal", items: basket.map((x) => ({ foodId: x.foodId, qty: Number(x.qty) || 0 })) };
  const draftTotals = mealTotals(draftMeal, foods);

  function saveMeal() {
    if (!basket.length) return;
    if (editingMealId) {
      update((prev) => ({ ...prev, meals: (prev.meals || []).map((m) => m.id === editingMealId ? { ...m, name: mealName.trim() || m.name, items: draftMeal.items } : m) }));
      flash("Meal updated");
    } else {
      const meal = { id: `m-${uid()}`, name: mealName.trim() || "Meal", items: draftMeal.items };
      update((prev) => ({ ...prev, meals: [meal, ...(prev.meals || [])] }));
      flash(`Saved ${meal.name} to meals`);
    }
    setBasket([]); setMealName(""); setMealServings(1); setEditingMealId(null);
  }
  function logDraftMeal() {
    if (!basket.length) return;
    logMeal(editingMealId ? { id: editingMealId, name: mealName || "Meal", items: draftMeal.items } : draftMeal, mealServings);
    setBasket([]); setMealName(""); setMealServings(1); setEditingMealId(null); setTab("log");
  }
  function startEditMeal(meal) {
    setMealName(meal.name);
    setBasket((meal.items || []).map((it) => ({ foodId: it.foodId, qty: it.qty })));
    setMealServings(1);
    setEditingMealId(meal.id);
    setOpenRow(null);
    setTab("meal");
  }
  function deleteMeal(id) {
    update((prev) => ({ ...prev, meals: (prev.meals || []).filter((m) => m.id !== id) }));
    setOpenRow(null);
  }

  function saveTargets() {
    const t = { calories: round(tDraft.calories), protein: round(tDraft.protein), carbs: round(tDraft.carbs), fat: round(tDraft.fat) };
    const any = t.calories || t.protein || t.carbs || t.fat;
    update((prev) => ({ ...prev, targets: any ? t : null }));
    setTargetsOpen(false);
  }
  function clearTargets() {
    update((prev) => ({ ...prev, targets: null }));
    setTDraft({ calories: "", protein: "", carbs: "", fat: "" });
    setTargetsOpen(false);
  }

  // ---- backup / restore ----
  function exportData() {
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `plate-backup-${today}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      flash("Backup downloaded");
    } catch (e) { flash("Backup failed on this device"); }
  }
  function importData(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const p = JSON.parse(String(reader.result));
        if (!p || typeof p !== "object" || !("days" in p || "foods" in p)) throw new Error("bad file");
        const ok = window.confirm("Restore this backup? It replaces the data currently on this device.");
        if (!ok) return;
        const next = {
          targets: p.targets ?? null,
          days: p.days && typeof p.days === "object" ? p.days : {},
          foods: Array.isArray(p.foods) && p.foods.length ? p.foods : SEED_FOODS,
          meals: Array.isArray(p.meals) ? p.meals : [],
          usage: p.usage && typeof p.usage === "object" ? p.usage : {},
          theme: p.theme === "light" || p.theme === "dark" ? p.theme : "auto",
        };
        setData(next);
        flash("Backup restored");
      } catch (e) { flash("That file didn't look like a Plate backup"); }
    };
    reader.readAsText(file);
  }

  // ---- derived: plate bar, week, frequent ----
  const pCal = totals.protein * 4, cCal = totals.carbs * 4, fCal = totals.fat * 9;
  const macroCal = pCal + cCal + fCal || 1;
  const seg = { protein: (pCal / macroCal) * 100, carbs: (cCal / macroCal) * 100, fat: (fCal / macroCal) * 100 };
  const hasEntries = entries.length > 0;
  const pastDays = data ? Object.keys(data.days || {}).filter((k) => k !== today).sort().reverse() : [];

  const weekKeys = last7Keys(today);
  const weekTotals = weekKeys.map((k) => ({ key: k, ...sumEntries((data?.days || {})[k] || []) }));
  const loggedDays = weekTotals.filter((w) => w.calories > 0);
  const avgCal = loggedDays.length ? Math.round(loggedDays.reduce((a, w) => a + w.calories, 0) / loggedDays.length) : 0;
  const avgPro = loggedDays.length ? Math.round(loggedDays.reduce((a, w) => a + w.protein, 0) / loggedDays.length) : 0;
  const weekMax = Math.max(1, ...weekTotals.map((w) => w.calories));

  const MACROS = [
    { key: "protein", label: "Protein", color: "var(--protein)" },
    { key: "carbs", label: "Carbs", color: "var(--carbs)" },
    { key: "fat", label: "Fat", color: "var(--fat)" },
  ];

  const q = search.trim().toLowerCase();
  const mealMatches = meals.filter((m) => m.name.toLowerCase().includes(q));
  const foodMatches = foods.filter((x) => x.name.toLowerCase().includes(q));
  const mq = mealSearch.trim().toLowerCase();
  const mealBuilderMatches = mq ? foods.filter((x) => x.name.toLowerCase().includes(mq)) : [];

  const frequent = !q
    ? [
        ...meals.map((m) => ({ kind: "meal", item: m, key: "meal:" + m.id })),
        ...foods.map((x) => ({ kind: "food", item: x, key: "food:" + x.id })),
      ]
        .filter((e) => usage[e.key])
        .sort((a, b) => (usage[b.key] || 0) - (usage[a.key] || 0))
        .slice(0, 6)
    : [];

  function Stepper({ value, onChange, step = 1, min = 0 }) {
    const num = Number(value);
    return (
      <div className="stepper">
        <button className="step" onClick={() => onChange(Math.max(min, Math.round((num - step) * 100) / 100))} aria-label="decrease">−</button>
        <input className="qty" inputMode="decimal" value={value} onChange={(e) => onChange(e.target.value)} />
        <button className="step" onClick={() => onChange(Math.round((num + step) * 100) / 100)} aria-label="increase">+</button>
      </div>
    );
  }

  return (
    <div className={`plate-root theme-${theme}`}>
      <style>{`

      <div className="wrap">

            {/* HERO */}

                  <div className="plate-seg" style={{ width: `${seg.protein}%`, background: "var(--protein)" }} />

                  return (
                    <div className="macro" key={m.key}>
                      <div className="macro-head"><span className="swatch" style={{ background: m.color }} /><span className="macro-name">{m.label}</span></div>

                    </div>

                })}
              </div>
            </div>

                          );
                        })}

                        {foodMatches.map((food) => {

                                <div className="editing-note">Editing “{food.name}”</div>

                                  <input className="mini-input span2" placeholder="Unit" value={efDraft.unit} onChange={(e) => setEfDraft({ ...efDraft, unit: e.target.value })} />

                                  <input className="mini-input num" inputMode="numeric" placeholder="Protein" value={efDraft.protein} onChange={(e) => setEfDraft({ ...efDraft, protein: e.target.value })} />
                                  <input className="mini-input num" inputMode="numeric" placeholder="Carbs" value={efDraft.carbs} onChange={(e) => setEfDraft({ ...efDraft, carbs: e.target.value })} />
                                  <input className="mini-input num" inputMode="numeric" placeholder="Fat" value={efDraft.fat} onChange={(e) => setEfDraft({ ...efDraft, fat: e.target.value })} />

                                  <button className="btn sm" onClick={saveEditFood}>Save</button>

                              )}
                            </div>
                          );

                </>

              {tab === "meal" && (
                <>
                  {editingMealId && <div className="editing-note">Editing an existing meal — Save meal updates it.</div>}
                  <input className="input" placeholder="Meal name (e.g. Ham & pepper jack sandwich)" value={mealName} onChange={(e) => setMealName(e.target.value)} />
                  <div style={{ height: 8 }} />
                  <input className="input" placeholder="Add an ingredient…" value={mealSearch} onChange={(e) => setMealSearch(e.target.value)} />
                  {mealBuilderMatches.length > 0 && (
                    <div className="list-scroll">
                      {mealBuilderMatches.slice(0, 8).map((food) => (
                        <div className="row" key={food.id}>
                          <div className="row-main"><div className="row-name">{food.name}</div><div className="row-meta">{macroLine(food.per)} · per {food.unit}</div></div>
                          <button className="add-mini" onClick={() => addToBasket(food)}>+ Add</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {basket.length > 0 ? (
                    <>
                      <div className="list-scroll" style={{ marginTop: 12 }}>
                        {basket.map((b) => {
                          const food = foods.find((x) => x.id === b.foodId);
                          if (!food) return null;
                          return (
                            <div className="row" key={b.foodId}>
                              <div className="row-main"><div className="row-name">{food.name}</div><div className="row-meta">per {food.unit}</div></div>
                              <Stepper value={b.qty} onChange={(v) => setBasketQty(b.foodId, v)} />
                              <button className="del" aria-label="Remove" onClick={() => removeFromBasket(b.foodId)}>×</button>
                            </div>
                          );
                        })}
                      </div>
                      <div className="serv-row"><span className="lbl">Servings to log now</span><Stepper value={mealServings} onChange={setMealServings} min={1} /></div>
                      <div className="total-line">
                        <span className="lbl">This meal ×{trimNum(Number(mealServings) || 1)}</span>
                        <span className="val">{macroLine({ calories: draftTotals.calories * (Number(mealServings) || 1), protein: draftTotals.protein * (Number(mealServings) || 1), carbs: draftTotals.carbs * (Number(mealServings) || 1), fat: draftTotals.fat * (Number(mealServings) || 1) })}</span>
                      </div>
                      <div className="btn-row">
                        <button className="btn" onClick={logDraftMeal}>Log now</button>
                        <button className="btn btn-soft" onClick={saveMeal}>{editingMealId ? "Update meal" : "Save meal"}</button>
                      </div>
                      {editingMealId && <button className="btn-ghost" onClick={() => { setBasket([]); setMealName(""); setEditingMealId(null); }}>Cancel edit</button>}
                    </>
                  ) : (
                    <div className="hint">Search ingredients above to build a meal, set its servings, then log or save it.</div>
                  )}
                </>
              )}

              {tab === "new" && (
                <>
                  <div className="form-grid">
                    <input className="input span2" placeholder="Food name" value={nf.name} onChange={(e) => setNf({ ...nf, name: e.target.value })} />
                    <input className="input span2" placeholder="Unit (slice, cup, 100 g, serving…)" value={nf.unit} onChange={(e) => setNf({ ...nf, unit: e.target.value })} />
                    <input className="input num" inputMode="numeric" placeholder="Calories" value={nf.calories} onChange={(e) => setNf({ ...nf, calories: e.target.value })} />
                    <input className="input num" inputMode="numeric" placeholder="Protein (g)" value={nf.protein} onChange={(e) => setNf({ ...nf, protein: e.target.value })} />
                    <input className="input num" inputMode="numeric" placeholder="Carbs (g)" value={nf.carbs} onChange={(e) => setNf({ ...nf, carbs: e.target.value })} />
                    <input className="input num" inputMode="numeric" placeholder="Fat (g)" value={nf.fat} onChange={(e) => setNf({ ...nf, fat: e.target.value })} />
                  </div>
                  <div className="btn-row">
                    <button className="btn" onClick={() => saveNewFood(true)} disabled={!nf.name.trim()}>Save & log</button>
                    <button className="btn btn-soft" onClick={() => saveNewFood(false)} disabled={!nf.name.trim()}>Save only</button>
                  </div>
                  <div className="hint">Tip: for gram-based logging, set the unit to “100 g” and enter the per-100 g numbers — then log 1.5 for 150 g.</div>
                </>
              )}

              <div className="toolbar">
                <button className="btn-ghost" onClick={() => setTargetsOpen((v) => !v)}>{targets ? "Edit daily goals" : "Set daily goals"}</button>
                <button className="btn-ghost" onClick={() => setDataOpen((v) => !v)}>{dataOpen ? "Hide backup" : "Backup & restore"}</button>
              </div>
              <div className="theme-row">
                <span className="theme-lbl">Appearance</span>
                <div className="seg">
                  {["auto", "light", "dark"].map((t) => (
                    <button key={t} className={`seg-btn ${theme === t ? "on" : ""}`} onClick={() => setTheme(t)}>
                      {t[0].toUpperCase() + t.slice(1)}
                    </button>
                  ))}
                </div>
              </div>
              {targetsOpen && (
                <div className="form-grid" style={{ marginTop: 4 }}>
                  <input className="input num span2" inputMode="numeric" placeholder="Calorie goal" value={tDraft.calories} onChange={(e) => setTDraft({ ...tDraft, calories: e.target.value })} />
                  <input className="input num" inputMode="numeric" placeholder="Protein (g)" value={tDraft.protein} onChange={(e) => setTDraft({ ...tDraft, protein: e.target.value })} />
                  <input className="input num" inputMode="numeric" placeholder="Carbs (g)" value={tDraft.carbs} onChange={(e) => setTDraft({ ...tDraft, carbs: e.target.value })} />
                  <input className="input num" inputMode="numeric" placeholder="Fat (g)" value={tDraft.fat} onChange={(e) => setTDraft({ ...tDraft, fat: e.target.value })} />
                  <button className="btn" onClick={saveTargets}>Save goals</button>
                  <button className="btn btn-soft" onClick={clearTargets}>Clear goals</button>
                </div>
              )}
              {dataOpen && (
                <div style={{ marginTop: 8 }}>
                  <div className="data-btns">
                    <button className="btn btn-soft sm" onClick={exportData}>Back up (download)</button>
                    <label className="btn btn-soft sm" style={{ textAlign: "center" }}>
                      Restore (upload)
                      <input type="file" accept="application/json,.json" style={{ display: "none" }} onChange={(e) => { importData(e.target.files && e.target.files[0]); e.target.value = ""; }} />
                    </label>
                  </div>
                  <div className="hint">Back up before clearing your browser. Restore replaces the data on this device — handy for moving between phone and computer.</div>
                </div>
              )}
            </div>

            {/* TODAY */}
            <div className="section-h">
              <h3>Today's log</h3>
              {hasEntries ? <button className="btn-ghost" onClick={clearToday}>Clear day</button> : null}
            </div>
            <div className="card list">
              {hasEntries ? (
                entries.map((e) => (
                  editEntryId === e.id && eeDraft ? (
                    <div className="editform" key={e.id}>
                      <div className="editing-note">Editing entry</div>
                      <div className="form-grid">
                        <input className="mini-input span2" placeholder="Name" value={eeDraft.name} onChange={(ev) => setEeDraft({ ...eeDraft, name: ev.target.value })} />
                        <input className="mini-input num" inputMode="numeric" placeholder="Calories" value={eeDraft.calories} onChange={(ev) => setEeDraft({ ...eeDraft, calories: ev.target.value })} />
                        <input className="mini-input num" inputMode="numeric" placeholder="Protein" value={eeDraft.protein} onChange={(ev) => setEeDraft({ ...eeDraft, protein: ev.target.value })} />
                        <input className="mini-input num" inputMode="numeric" placeholder="Carbs" value={eeDraft.carbs} onChange={(ev) => setEeDraft({ ...eeDraft, carbs: ev.target.value })} />
                        <input className="mini-input num" inputMode="numeric" placeholder="Fat" value={eeDraft.fat} onChange={(ev) => setEeDraft({ ...eeDraft, fat: ev.target.value })} />
                      </div>
                      <div className="btn-row">
                        <button className="btn sm" onClick={saveEditEntry}>Save</button>
                        <button className="btn sm btn-soft" onClick={() => { setEditEntryId(null); setEeDraft(null); }}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <div className="entry" key={e.id}>
                      <div className="entry-left">
                        <div className="entry-name">{e.name}</div>
                        <div className="entry-macros">P {e.protein}g · C {e.carbs}g · F {e.fat}g</div>
                      </div>
                      <div className="entry-cal">{e.calories}</div>
                      <button className="iconbtn" aria-label="Edit" onClick={() => startEditEntry(e)}>✎</button>
                      <button className="x" aria-label={`Remove ${e.name}`} onClick={() => removeEntry(e.id)}>×</button>
                    </div>
                  )
                ))
              ) : (
                <div className="empty">Nothing logged yet. Add from the food list above — it resets on its own tomorrow.</div>
              )}
            </div>

            {/* THIS WEEK */}
            <div className="section-h">
              <h3>This week</h3>
              <button className="btn-ghost" onClick={() => setWeekOpen((v) => !v)}>{weekOpen ? "Hide" : "Show"}</button>
            </div>
            {weekOpen && (
              <div className="card week-card">
                <div className="week-stats">
                  <div className="week-stat"><div className="n">{avgCal || "—"}{avgCal ? <span> cal</span> : null}</div><div className="l">Avg / day</div></div>
                  <div className="week-stat"><div className="n">{avgPro || "—"}{avgPro ? <span> g</span> : null}</div><div className="l">Avg protein</div></div>
                  <div className="week-stat"><div className="n">{loggedDays.length}</div><div className="l">Days logged</div></div>
                </div>
                <div className="week-bars">
                  {weekTotals.map((w) => (
                    <div className="wbar-col" key={w.key}>
                      <div className="wbar-val">{w.calories || ""}</div>
                      <div className="wbar-track"><div className={`wbar ${w.key === today ? "today" : ""}`} style={{ height: `${Math.max(3, (w.calories / weekMax) * 100)}%` }} /></div>
                      <div className="wbar-lbl">{dayInitial(w.key)}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* HISTORY */}
            {pastDays.length > 0 && (
              <>
                <div className="section-h">
                  <h3>Earlier days</h3>
                  <button className="btn-ghost" onClick={() => setHistoryOpen((v) => !v)}>{historyOpen ? "Hide" : "Show"}</button>
                </div>
                {historyOpen && (
                  <div className="card list">
                    {pastDays.map((k) => {
                      const t = sumEntries(data.days[k]);
                      return (
                        <div className="hist-row" key={k}>
                          <span className="hist-day">{shortDate(k)}</span>
                          <span className="hist-nums"><span className="hist-kcal">{t.calories} kcal</span> · P {t.protein} · C {t.carbs} · F {t.fat}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}

            <div className="footnote">
              Saved on this device · starts fresh each day.<br />
              Built-in numbers are editable estimates — tap ⋯ then Edit to match your label.<br />
              <span className="ver">Plate v{APP_VERSION}</span>
            </div>

            {saveMsg ? <div className="toast">{saveMsg}</div> : null}
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
window.__mounted = true;
if (navigator.storage && navigator.storage.persist) { navigator.storage.persist().catch(function(){}); }

</script>
<script>
(function(){
  try {
    var code = document.getElementById("appsrc").textContent;
    var out = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  } catch (err) {
    window.__err = true;
    var r = document.getElementById("root");
    if (r) r.innerHTML = '<div style="font-family:-apple-system,sans-serif;padding:26px;color:#1B231D;font-size:15px">Build error: ' + String((err && err.message) || err) + '</div>';
  }
})();
</script>
</body>
</html>
